<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VASCO PARAÍBA JOGOS</title>
    <link rel="stylesheet" href="../styles/style.css">
    <script src="../scripts/script.js" defer></script>
    <script src="../scripts/events.js" defer></script>
</head>

<body>

    <header>
        <!-- <img src="../ícone_Mascote_Zap_PNG.png" alt="Logo Torcida Vasco Paraíba" class="logo"> -->
        <h1>VASCO PARAÍBA JOGOS</h1>
        <div class="tagline">A distância é apenas um detalhe</div>
    </header>

    <main class="container">

        <section class="card">
            <h2>Próximos jogos do Vasco da Gama</h2>

            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Confronto</th>
                        <th>Competição</th>
                        <th>Horário</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

        </section>

        <section class="card event-form">
            <div class="event-head">
                <h2>Eventos Marcados</h2> <button class="btnSmall btn" id="btnOpenForm">+ criar</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <td>Evento</td>
                        <td>Local</td>
                        <td>Endereço</td>
                        <td>Data</td>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" id="eventInput" readonly></td>
                        <td><input type="text" id="localInput" readonly></td>
                        <td><input type="text" id="addressInput" readonly></td>
                        <td><input type="datetime-local" id="dateInput" value="2025-05-05T08:00" readonly></td>
                    </tr>
                </tbody>
            </table>
        </section>
        <section>
            <form action="" id="form-to-create-event" class=" hidden">
                <label for="event">Evento:</label>
                <input type="text" name="event" id="event">
                <label for="local">local:</label>
                <input type="text" name="local" id="local">
                <label for="date">Data:</label>
                <input type="date" name="date" id="date"><br>

                <label for="address">Endereço:</label>
                <input type="text" id="address">
                <label for="number">Número:</label>
                <input type="text" id="add">
                <label for="line2">Complemento:</label>
                <input type="text" id="line2">

                <div class="divCEP">
                    <label for="cep">CEP:</label>
                    <input type="text" id="cep">
                    <button class="btn btnSmall findAddress" id="btnFindAddress">localizar</button>
                </div>

                <div class="formBtns">
                    <button class="btn btnSmall cta add" id="addEvent">adicionar</button>
                    <button class="btn btnSmall btnHideForm" id="btnHideForm">ocultar</button>
                </div>
        </section>
    </main>

    <footer class="footer">© 2025 Torcida Vasco Paraíba</footer>


</body>

</html>
